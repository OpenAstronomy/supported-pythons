name: test

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-action:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - romancal
          - spacetelescope/romancal
          - https://github.com/spacetelescope/romancal
        package-ref: ['']
        include:
          - package: romancal
            package-ref: 0.22.0
          - package: spacetelescope/romancal
            package-ref: 0.22.0
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: supported-pythons
        uses: ./
        with:
          package: ${{ matrix.package }}
          package-ref: ${{ matrix.package-ref }}
      - run: echo versions=${{ steps.supported-pythons.outputs.versions }}
      - run: echo oldest=${{ steps.supported-pythons.outputs.oldest }}
      - run: echo latest=${{ steps.supported-pythons.outputs.latest }}
