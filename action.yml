name: supported-pythons
description: "Retrieve active (not end-of-life) minor versions of Python supported by a Python package"
branding:
  icon: more-vertical
  color: green

inputs:
  package:
    description: package name on PyPI, or URL to source repository containing `pyproject.toml`
    required: false
    default: ""
  package-ref:
    description: release version on PyPI, or tag / branch / commit of package source
    required: false
    default: ""
  no-eoas:
    description: also omit end-of-active-support versions of Python
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: 3
    - if: inputs.package == '' || contains(inputs.package, '/')
      run: git clone ${{ inputs.package != '' && contains(inputs.package, 'http') && inputs.package || format('https://github.com/{0}', inputs.package) || github.repository }} ${{ (inputs.package-ref != '' || inputs.package == '') && format('--revision={0}', inputs.package != '' && inputs.package-ref || github.sha) || '' }} ../package/
      shell: bash
    - if: inputs.package != '' && !contains(inputs.package, '/')
      run: mkdir ../package && cd ../package && curl https://pypi.org/pypi/${{ inputs.package }}/json | python -c "import json, sys; releases = json.loads(sys.stdin.read())[\"releases\"]; release = ${{ inputs.package-ref != '' && format('releases[\"{0}\"]', inputs.package-ref) || 'list(releases.values())[-1]' }}; print([dist for dist in release if dist[\"packagetype\"] == \"sdist\"][-1][\"url\"]);" | xargs -n 1 curl -L | tar xz --strip-components=1
      shell: bash
    - id: versions
      run: echo versions=$(pipx run ${{ github.action_path }}/supported_pythons.py --package-source=../package/ ${{ inputs.no-eoas == 'true' && '--no-eoas' || '' }}) >> $GITHUB_OUTPUT
      shell: bash
    - id: oldest
      run: echo oldest=$(python -c 'print(${{ steps.versions.outputs.versions }}[0])') >> $GITHUB_OUTPUT
      shell: bash
    - id: latest
      run: echo latest=$(python -c 'print(${{ steps.versions.outputs.versions }}[-1])') >> $GITHUB_OUTPUT
      shell: bash

outputs:
  versions:
    description: "Python minor versions as a JSON list"
    value: ${{ steps.versions.outputs.versions }}
  oldest:
    description: "oldest supported Python minor version"
    value: ${{ steps.oldest.outputs.oldest }}
  latest:
    description: "latest supported Python minor version"
    value: ${{ steps.latest.outputs.latest }}
